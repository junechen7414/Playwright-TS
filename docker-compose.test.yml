services:
  # Service Name: app (Spring Boot 應用)
  app:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-junechen7414}/springboot:${IMAGE_TAG:-latest}
    pull_policy: always # 確保每次測試都使用最新的映像檔，避免因為舊映像檔導致測試不一致    
    # 容器名稱，方便指令podman ps 等操作識別和管理，不用於真正的網路通信
    container_name: spring-boot-app-test
    ports:
      - "8787:8787" # 本機訪問請用 localhost:8787
    environment:
      # 內部溝通：使用服務名稱 'oracle-db' 而非 localhost
      - SPRING_PROFILES_ACTIVE=e2e
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=${ORACLE_TEST_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${ORACLE_TEST_PASSWORD}
    networks:
      - test-net
    depends_on:
      oracle-db:
        condition: service_healthy # 關鍵：DB 健康才啟動 App

  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-db-test
    ports:
      - "1521:1521"
    environment:
      # Oracle DB 的環境變數設定，根據官方文件，這些是必要的參數
      # Oracle 的啟動腳本（runOracle.sh）內部有一套預設的命名規則（預設 SID 就是 FREE，PDB 就是 FREEPDB1）。
      - ORACLE_SID=FREE
      - ORACLE_PDB=FREEPDB1
      - ORACLE_TEST_USERNAME=${ORACLE_TEST_USERNAME}
      - ORACLE_TEST_PASSWORD=${ORACLE_TEST_PASSWORD}
    volumes:
      # 存放啟動腳本
      - ./init-scripts:/opt/oracle/scripts/startup
      # 存放範本檔案 (掛載到另一個自定義目錄)
      - ./init-scripts-template:/opt/oracle/template
    healthcheck:
      # 三階段健康檢查：PDB 開啟 + 使用者建立 + Listener 註冊服務
      test: 
        - "CMD-SHELL"
        - |
          # 1. 檢查 PDB 是否處於 READ WRITE 模式
          PDB_STATUS=$$(sqlplus -S / as sysdba <<'EOSQL'
          SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF
          SELECT open_mode FROM v$$pdbs WHERE name='FREEPDB1';
          EXIT;
          EOSQL
          )
          
          if ! echo "$$PDB_STATUS" | grep -q 'READ WRITE'; then
            echo "PDB not ready"
            exit 1
          fi
          
          # 2. 檢查測試使用者是否已建立
          USER_EXISTS=$$(sqlplus -S / as sysdba <<'EOSQL'
          SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF
          ALTER SESSION SET CONTAINER = FREEPDB1;
          SELECT COUNT(*) FROM dba_users WHERE username = UPPER('${ORACLE_TEST_USERNAME}');
          EXIT;
          EOSQL
          )
          
          USER_EXISTS=$$(echo "$$USER_EXISTS" | tr -d '[:space:]')
          
          if [ "$$USER_EXISTS" != "1" ]; then
            echo "Test user not created yet"
            exit 1
          fi
          
          # 3. 檢查 Listener 是否已註冊 FREEPDB1 服務
          LISTENER_STATUS=$$(lsnrctl status | grep -i "FREEPDB1" | wc -l)
          
          if [ "$$LISTENER_STATUS" -eq "0" ]; then
            echo "FREEPDB1 service not registered with listener"
            exit 1
          fi
          
          echo "Database fully ready"
          exit 0
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - test-net

networks:
  test-net:
    driver: bridge

