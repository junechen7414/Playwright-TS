name: Spring Boot API E2E Tests
on:
  # 支援手動觸發
  workflow_dispatch:
  # 支援後端連動觸發 (由後端 Action 發送訊號)
  repository_dispatch:
    types: [backend_image_updated]
  # 支援 PR 觸發
  pull_request:
    branches: [main]

jobs:
  e2e-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # 注意：我們移除原本的 container 設定，改在 Runner 本機操作 Docker Compose
    # 這樣才能同時管理多個容器 (App, DB, Playwright)

    steps:
      # 使用預設的動作來管理 ref 和 repo 相關資訊，在PR的時候不用寫三元運算子
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 原本的 A、B 步驟合併為這一個
      - name: Start Environment and Wait
        env:
          ORACLE_USERNAME: ${{ secrets.DB_USER }}
          ORACLE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          # 這裡也可以順便帶入 GITHUB_REPOSITORY_OWNER 給 Docker Compose 使用
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          # 1. 啟動並等待健康檢查完成
          # --quiet-pull 減少日誌干擾，--wait 會參考你 compose 裡的 healthcheck
          docker compose -f docker-compose.test.yml up -d --wait --quiet-pull
          
          # 2. (選用) 萬一失敗了，印出日誌方便除錯
          if [ $? -ne 0 ]; then
            docker compose -f docker-compose.test.yml logs
            exit 1
          fi

      # 步驟 C：執行測試 (利用 Playwright 容器跑，或者在本機跑)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update API Types from Swagger
        run: pnpm run api-spec:update

      - name: Run Playwright tests
        run: pnpm playwright test --project=springboot-api
        env:
          # 指向剛啟動的 Docker 容器位址 (通常是 localhost:8787)
          BASE_URL: http://localhost:8787
          
      - name: Stop Environment
        if: always()
        run: docker compose -f docker-compose.test.yml down

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30