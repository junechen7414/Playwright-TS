name: Spring Boot API E2E Tests
on:
  # 支援手動觸發 (最後的保險)
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Backend image tag to test'
        required: false
        default: 'latest'
  # 支援後端連動觸發 (後端 Main 自動觸發 / 後端 PR 貼標籤觸發)
  repository_dispatch:
    types: [backend_image_updated]
  # 支援本 Repo PR 標籤觸發 (測試腳本變更時使用)
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

jobs:
  e2e-test:
    # 只有以下三種情況會執行：
    # 1. 後端發送訊號 (repository_dispatch)
    # 2. 手動觸發 (workflow_dispatch)
    # 3. 本 PR 被貼上 'e2e-test' 標籤
    if: |
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e-test'))
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Image Tag
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            # 來自後端的自動/手動標籤觸發，直接拿 payload 裡的 tag
            TAG="${{ github.event.client_payload.image_tag }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            # 本 Repo 的 PR 測試，預設對接後端的 latest 或 main 環境
            TAG="latest"
          fi
          echo "IMAGE_TAG=$TAG" >> $GITHUB_OUTPUT
          echo "🏷️ Using image tag: $TAG"
          echo "### 🚀 Test Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** \`$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 原本的 A、B 步驟合併為這一個
      - name: Start Environment and Wait
        env:
          ORACLE_TEST_USERNAME: ${{ secrets.DB_USER }}
          ORACLE_TEST_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.IMAGE_TAG }}
        run: |
          echo "🚀 Starting environment with image tag: $IMAGE_TAG"
          # --wait 會等待 Dockerfile 中的 HEALTHCHECK 成功
          docker compose -f docker-compose.test.yml up -d --wait --quiet-pull
          
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml ps
          
          # 檢查 app 是否真的 healthy (確保不是因為超時而強行結束)
          STATUS=$(docker inspect --format='{{json .State.Health.Status}}' spring-boot-app-test)
          echo "App status: $STATUS"
          if [ "$STATUS" != "\"healthy\"" ]; then
            echo "❌ App failed to become healthy. Logs:"
            docker compose -f docker-compose.test.yml logs app
            exit 1
          fi

      # 步驟 C：執行測試 (利用 Playwright 容器跑，或者在本機跑)
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update API Types from Swagger
        run: pnpm run api-spec:update

      - name: Run Playwright tests
        run: pnpm playwright test --project=springboot-api
        env:
          # 指向剛啟動的 Docker 容器位址 (通常是 localhost:8787)
          BASE_URL: http://localhost:8787
          
      - name: Stop Environment
        if: always()
        run: docker compose -f docker-compose.test.yml down

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30